{% extends "base.html" %}
{% block title %}QRコード — {{ seminar.title }}{% endblock %}

{% block body %}
<div class="header">
    <div class="header-inner">
        <a href="{{ url_for('admin_dashboard', key=key) }}" class="btn-back">← 戻る</a>
        <span class="header-title">QRコード</span>
    </div>
</div>

<div class="container py-4 text-center">
    <h2 style="font-size:1.2rem; font-weight:900; margin-bottom:6px;">{{ seminar.title }}</h2>
    <p class="text-muted mb-4">{{ seminar.date_display }}</p>

    <!-- QRコード -->
    <div id="qrcode" style="display:inline-block; padding:16px; background:#fff; border:2px solid #e5e5e5; border-radius:16px; margin-bottom:20px;"></div>

    <p style="font-size:0.85rem; color:#737373; word-break:break-all; margin-bottom:20px;">
        {{ qr_url }}
    </p>

    <p style="font-size:0.9rem; font-weight:700; color:#404040; line-height:1.7;">
        このQRコードをセミナー会場で受講者に読み取ってもらってください。<br>
        読み取ると資料が自動でライブラリに追加されます。
    </p>

    <!-- 印刷用ボタン -->
    <button onclick="window.print()" class="btn btn-outline btn-block mt-4">
        印刷する
    </button>
</div>

<style>
@media print {
    .header, .btn { display: none !important; }
    .container { max-width: 100%; }
}
</style>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    new QRCode(document.getElementById("qrcode"), {
        text: "{{ qr_url }}",
        width: 280,
        height: 280,
        colorDark: "#1a1a1a",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
});
</script>
{% endblock %}
