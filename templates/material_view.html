{% extends "base.html" %}
{% block title %}{{ material.title }} — 極真館組手セミナー{% endblock %}

{% block body %}
<div class="header">
    <div class="header-inner">
        <a href="{{ url_for('seminar_detail', seminar_id=seminar.id) }}" class="btn-back">← 戻る</a>
        <span class="header-title">資料閲覧</span>
    </div>
</div>

<div class="material-viewer">
    <!-- 資料ヘッダー -->
    <div style="background:#fef2f2; border:2px solid #fca5a5; border-radius:16px; padding:18px; margin-bottom:24px;">
        <p class="seminar-date">{{ seminar.date_display }}</p>
        <h1 style="font-size:1.3rem; font-weight:900; margin-bottom:4px;">{{ material.title }}</h1>
        <p class="text-muted" style="font-size:0.85rem;">{{ seminar.title }} — {{ seminar.subtitle }}</p>
    </div>

    <!-- HTML資料本文 -->
    <div class="material-content">
        {{ material.content_html | safe }}
    </div>

    <!-- フッター -->
    <div style="margin-top:40px; padding-top:20px; border-top:2px solid #e5e5e5; text-align:center;">
        <p class="text-muted text-sm">極真館組手セミナーライブラリ</p>
        <a href="{{ url_for('seminar_detail', seminar_id=seminar.id) }}" class="btn btn-outline btn-sm mt-2">
            セミナー詳細に戻る
        </a>
    </div>
</div>
{% endblock %}
